# Docker Compose configuration

services:
  # PostgreSQL Database
  db:
    image: postgres:13-alpine
    container_name: mnesya-db
    environment:
      POSTGRES_USER: mnesya_user
      POSTGRES_PASSWORD: mnesya_password
      POSTGRES_DB: mnesya_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mnesya-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnesya_user -d mnesya_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: mnesya-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mnesya_user:mnesya_password@db:5432/mnesya_db
      SECRET_KEY: your-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - mnesya-network
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Frontend (Expo/React Native)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: mnesya-frontend
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=localhost
    networks:
      - mnesya-network
    stdin_open: true
    tty: true

  # APScheduler Worker (for reminders)
  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: mnesya-worker
    environment:
      DATABASE_URL: postgresql://mnesya_user:mnesya_password@db:5432/mnesya_db
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ../backend:/app
    networks:
      - mnesya-network
    command: python -m worker.scheduler

  # pgAdmin - PostgreSQL Administration Panel
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mnesya-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mnesya.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db
    networks:
      - mnesya-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  mnesya-network:
    driver: bridge
