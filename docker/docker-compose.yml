# Docker Compose configuration — développement local
# Copier docker/.env.example en docker/.env avant de lancer

services:
  # PostgreSQL Database
  db:
    image: postgres:13-alpine
    container_name: mnesya-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mnesya-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: mnesya-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      DOCS_USERNAME: ${DOCS_USERNAME}
      DOCS_PASSWORD: ${DOCS_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - mnesya-network
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Frontend (Expo/React Native)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: mnesya-frontend
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=localhost
    networks:
      - mnesya-network
    stdin_open: true
    tty: true

  # APScheduler Worker (for reminders)
  worker:
    profiles:
      - worker  # Disabled by default, start with: docker-compose --profile worker up
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: mnesya-worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ../backend:/app
    networks:
      - mnesya-network
    command: python -m worker.scheduler

  # pgAdmin - PostgreSQL Administration Panel
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mnesya-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - db
    networks:
      - mnesya-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  mnesya-network:
    driver: bridge
