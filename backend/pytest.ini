[pytest]
# Pytest configuration for Mnesya Backend

# Test discovery
testpaths = app/test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts = -v --tb=short

# Filter warnings
filterwarnings =
    # Ignore passlib crypt deprecation (external library, will be fixed upstream)
    ignore:.*'crypt' is deprecated.*:DeprecationWarning:passlib
